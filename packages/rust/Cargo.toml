[package]
name = "hashrope"
version = "0.2.0"
edition = "2021"
authors = ["Muntaser Syed <muntaser@ieee.org>"]
description = "Hash rope: a BB[2/7] balanced binary tree with polynomial hash metadata for O(log n) concat, split, substring hashing, and O(log q) repetition encoding."
license = "MIT"
repository = "https://github.com/jemsbhai/hashrope"
keywords = ["hash", "rope", "data-structure", "polynomial-hash", "mersenne-prime"]
categories = ["data-structures", "algorithms"]
readme = "README.md"

[dependencies]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "benchmarks"
harness = false
